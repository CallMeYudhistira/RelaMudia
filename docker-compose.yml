services:
    app:
        build: .
        container_name: relamudia_app
        restart: always
        ports:
            - "8001:80" # Map internal 80 to external 8001
        environment:
            APP_ENV: production
            APP_DEBUG: false
            APP_URL: https://relamudia.dhisproject.my.id
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: relamudia
            DB_USERNAME: callmeudiss
            DB_PASSWORD: dhisproject
        depends_on:
            db:
                condition: service_healthy
        networks:
            - relamudia_network

    db:
        image: mysql:8.0
        container_name: relamudia_db
        restart: always
        ports:
            - "3301:3306"
        environment:
            MYSQL_DATABASE: relamudia
            MYSQL_ROOT_PASSWORD: dhisproject
            MYSQL_USER: callmeudiss
            MYSQL_PASSWORD: dhisproject
        volumes:
            - relamudia_db_data:/var/lib/mysql
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - relamudia_network

networks:
    relamudia_network:
        driver: bridge

volumes:
    relamudia_db_data:
